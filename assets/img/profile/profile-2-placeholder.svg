<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d896ff;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#b366ff;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f4c2a0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8a87c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <circle cx="100" cy="100" r="100" fill="url(#bgGradient)"/>
  
  <!-- Head -->
  <circle cx="100" cy="80" r="35" fill="url(#skinGradient)"/>
  
  <!-- Hair -->
  <path d="M 65 80 Q 65 45 100 45 Q 135 45 135 80 L 135 90 Q 135 100 100 102 Q 65 100 65 90 Z" fill="#8B4513" opacity="0.9"/>
  
  <!-- Hair highlight -->
  <path d="M 75 55 Q 75 50 85 48 Q 90 47 92 52 Q 90 55 85 56 Q 78 57 75 55 Z" fill="#A0522D" opacity="0.6"/>
  
  <!-- Eyes -->
  <ellipse cx="88" cy="75" rx="5" ry="6" fill="#4A4A4A"/>
  <ellipse cx="112" cy="75" rx="5" ry="6" fill="#4A4A4A"/>
  
  <!-- Eye highlights -->
  <circle cx="89" cy="74" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="113" cy="74" r="2" fill="#ffffff" opacity="0.7"/>
  
  <!-- Eyebrows -->
  <path d="M 83 68 Q 88 66 93 67" stroke="#6B3410" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M 107 67 Q 112 66 117 68" stroke="#6B3410" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 100 75 L 100 88" stroke="#d9a574" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <circle cx="97" cy="88" r="1.5" fill="#d9a574"/>
  <circle cx="103" cy="88" r="1.5" fill="#d9a574"/>
  
  <!-- Mouth -->
  <path d="M 90 93 Q 100 98 110 93" stroke="#c78b7b" stroke-width="2" fill="none" stroke-linecap="round"/>
  
  <!-- Lips fill -->
  <path d="M 90 93 Q 100 96 110 93 Q 100 95 90 93 Z" fill="#e8b5a8" opacity="0.6"/>
  
  <!-- Neck -->
  <rect x="92" y="112" width="16" height="12" fill="url(#skinGradient)"/>
  
  <!-- Shoulders/Body -->
  <ellipse cx="100" cy="135" rx="45" ry="50" fill="#d896ff" opacity="0.3"/>
  
  <!-- Decorative element -->
  <circle cx="100" cy="100" r="100" fill="none" stroke="#d896ff" stroke-width="1" opacity="0.3"/>
</svg>