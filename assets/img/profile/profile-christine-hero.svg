<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bgGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d896ff;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#b366ff;stop-opacity:0.15" />
    </linearGradient>
    <linearGradient id="skinGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8966f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2817;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="clothGradientHero" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8a3ff;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b383ff;stop-opacity:0.8" />
    </linearGradient>
    <filter id="shadowHero">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="url(#bgGradientHero)"/>
  
  <!-- Subtle background shapes -->
  <circle cx="50" cy="80" r="80" fill="#d896ff" opacity="0.08"/>
  <circle cx="350" cy="400" r="100" fill="#d896ff" opacity="0.06"/>
  
  <!-- Clothing -->
  <path d="M 120 300 L 80 320 L 70 500 L 330 500 L 320 320 L 280 300 Z" fill="url(#clothGradientHero)" filter="url(#shadowHero)"/>
  
  <!-- Neck -->
  <rect x="165" y="280" width="70" height="30" fill="url(#skinGradientHero)"/>
  
  <!-- Head -->
  <circle cx="200" cy="150" r="90" fill="url(#skinGradientHero)" filter="url(#shadowHero)"/>
  
  <!-- Hair - Long straight with volume -->
  <path d="M 110 130 Q 100 150 105 200 Q 108 250 120 300 L 135 305 Q 130 250 128 200 Q 125 160 130 130 Z" fill="url(#hairGradientHero)" opacity="0.95"/>
  
  <path d="M 290 130 Q 300 150 295 200 Q 292 250 280 300 L 265 305 Q 270 250 272 200 Q 275 160 270 130 Z" fill="url(#hairGradientHero)" opacity="0.95"/>
  
  <!-- Hair main part -->
  <ellipse cx="200" cy="100" rx="85" ry="75" fill="url(#hairGradientHero)"/>
  
  <!-- Hair with texture/waves -->
  <path d="M 140 120 Q 150 110 160 115 Q 165 120 160 130 Q 150 125 140 125 Z" fill="#5c3d2e" opacity="0.6"/>
  <path d="M 240 115 Q 250 110 260 115 Q 265 120 260 130 Q 250 125 240 125 Z" fill="#5c3d2e" opacity="0.6"/>
  <path d="M 180 95 Q 190 88 200 90 Q 210 92 205 100 Q 195 98 180 100 Z" fill="#5c3d2e" opacity="0.5"/>
  
  <!-- Eyes -->
  <ellipse cx="165" cy="140" rx="12" ry="14" fill="#3d2817"/>
  <ellipse cx="235" cy="140" rx="12" ry="14" fill="#3d2817"/>
  
  <!-- Eye whites (for depth) -->
  <ellipse cx="165" cy="142" rx="8" ry="10" fill="#2c1810"/>
  <ellipse cx="235" cy="142" rx="8" ry="10" fill="#2c1810"/>
  
  <!-- Eye shine/highlights -->
  <circle cx="168" cy="138" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="238" cy="138" r="5" fill="#ffffff" opacity="0.9"/>
  <circle cx="167" cy="137" r="2" fill="#d896ff" opacity="0.6"/>
  <circle cx="237" cy="137" r="2" fill="#d896ff" opacity="0.6"/>
  
  <!-- Eyebrows -->
  <path d="M 150 128 Q 165 123 177 127" stroke="#3d2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 223 127 Q 235 123 250 128" stroke="#3d2817" stroke-width="3" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 200 145 L 200 175" stroke="#d9956f" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7"/>
  <circle cx="195" cy="177" r="3" fill="#d9956f" opacity="0.7"/>
  <circle cx="205" cy="177" r="3" fill="#d9956f" opacity="0.7"/>
  
  <!-- Mouth -->
  <path d="M 170 190 Q 200 210 230 190" stroke="#c97f6f" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 170 190 Q 200 205 230 190 Q 200 200 170 190 Z" fill="#e8a890" opacity="0.4"/>
  
  <!-- Lips detail -->
  <path d="M 180 195 Q 200 202 220 195" stroke="#d9897a" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  
  <!-- Blush/cheeks -->
  <ellipse cx="130" cy="160" rx="18" ry="12" fill="#d896ff" opacity="0.25"/>
  <ellipse cx="270" cy="160" rx="18" ry="12" fill="#d896ff" opacity="0.25"/>
  
  <!-- Chin/jawline shading -->
  <ellipse cx="200" cy="230" rx="60" ry="20" fill="#d9956f" opacity="0.15"/>
  
  <!-- Ears -->
  <ellipse cx="110" cy="150" rx="12" ry="20" fill="url(#skinGradientHero)" opacity="0.8"/>
  <ellipse cx="290" cy="150" rx="12" ry="20" fill="url(#skinGradientHero)" opacity="0.8"/>
  <path d="M 115 155 Q 120 160 115 165" stroke="#d9956f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 285 155 Q 280 160 285 165" stroke="#d9956f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Decorative element - frame -->
  <rect x="20" y="20" width="360" height="460" fill="none" stroke="#d896ff" stroke-width="2" opacity="0.3" rx="10"/>
  
  <!-- Small accent dots -->
  <circle cx="30" cy="30" r="4" fill="#d896ff" opacity="0.4"/>
  <circle cx="370" cy="470" r="4" fill="#d896ff" opacity="0.4"/>
</svg>