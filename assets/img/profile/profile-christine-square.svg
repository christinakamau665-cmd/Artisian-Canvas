<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 350" width="300" height="350">
  <defs>
    <linearGradient id="bgGradSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#f0e5ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d8c5ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="skinGradSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5b896;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8966f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hairGradSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a3728;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d2817;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="topGradSquare" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d8a3ff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#c896ff;stop-opacity:0.9" />
    </linearGradient>
    <filter id="shadowSquare">
      <feDropShadow dx="2" dy="3" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="350" fill="url(#bgGradSquare)"/>
  
  <!-- Decorative background circles -->
  <circle cx="280" cy="30" r="60" fill="#d896ff" opacity="0.12"/>
  <circle cx="20" cy="300" r="70" fill="#d896ff" opacity="0.10"/>
  
  <!-- Clothing/Top -->
  <path d="M 80 230 L 60 250 L 50 350 L 250 350 L 240 250 L 220 230 Z" fill="url(#topGradSquare)" filter="url(#shadowSquare)"/>
  
  <!-- Neck -->
  <rect x="120" y="210" width="60" height="25" fill="url(#skinGradSquare)"/>
  
  <!-- Head -->
  <circle cx="150" cy="100" r="75" fill="url(#skinGradSquare)" filter="url(#shadowSquare)"/>
  
  <!-- Hair - Long with volume -->
  <path d="M 75 90 Q 65 110 68 150 Q 70 190 80 230 L 92 235 Q 85 190 83 150 Q 80 120 85 90 Z" fill="url(#hairGradSquare)" opacity="0.93"/>
  
  <path d="M 225 90 Q 235 110 232 150 Q 230 190 220 230 L 208 235 Q 215 190 217 150 Q 220 120 215 90 Z" fill="url(#hairGradSquare)" opacity="0.93"/>
  
  <!-- Hair top/back -->
  <ellipse cx="150" cy="50" rx="70" ry="60" fill="url(#hairGradSquare)"/>
  
  <!-- Hair texture/highlights -->
  <path d="M 105 75 Q 118 65 128 72 Q 132 78 125 88 Q 115 82 105 82 Z" fill="#5c3d2e" opacity="0.55"/>
  <path d="M 172 72 Q 182 65 195 75 Q 198 82 190 88 Q 178 82 172 82 Z" fill="#5c3d2e" opacity="0.55"/>
  <path d="M 135 45 Q 150 38 165 48 Q 168 55 160 62 Q 148 58 135 58 Z" fill="#5c3d2e" opacity="0.45"/>
  
  <!-- Eyes -->
  <ellipse cx="125" cy="95" rx="10" ry="12" fill="#3d2817"/>
  <ellipse cx="175" cy="95" rx="10" ry="12" fill="#3d2817"/>
  
  <!-- Pupils/depth -->
  <ellipse cx="125" cy="97" rx="6" ry="8" fill="#2c1810"/>
  <ellipse cx="175" cy="97" rx="6" ry="8" fill="#2c1810"/>
  
  <!-- Eye shine -->
  <circle cx="128" cy="92" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="178" cy="92" r="4" fill="#ffffff" opacity="0.95"/>
  <circle cx="127" cy="91" r="1.5" fill="#d896ff" opacity="0.7"/>
  <circle cx="177" cy="91" r="1.5" fill="#d896ff" opacity="0.7"/>
  
  <!-- Eyebrows -->
  <path d="M 115 82 Q 125 78 135 82" stroke="#3d2817" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 165 82 Q 175 78 185 82" stroke="#3d2817" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  
  <!-- Nose -->
  <path d="M 150 100 L 150 125" stroke="#d9956f" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.6"/>
  <circle cx="147" cy="126" r="2.5" fill="#d9956f" opacity="0.6"/>
  <circle cx="153" cy="126" r="2.5" fill="#d9956f" opacity="0.6"/>
  
  <!-- Mouth -->
  <path d="M 130 140 Q 150 155 170 140" stroke="#c97f6f" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 130 140 Q 150 150 170 140 Q 150 147 130 140 Z" fill="#e8a890" opacity="0.35"/>
  
  <!-- Smile detail -->
  <path d="M 138 142 Q 150 148 162 142" stroke="#d9897a" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Blush/cheeks -->
  <ellipse cx="105" cy="110" rx="15" ry="10" fill="#d896ff" opacity="0.28"/>
  <ellipse cx="195" cy="110" rx="15" ry="10" fill="#d896ff" opacity="0.28"/>
  
  <!-- Facial shading for dimension -->
  <ellipse cx="150" cy="175" rx="50" ry="18" fill="#d9956f" opacity="0.12"/>
  
  <!-- Ears -->
  <ellipse cx="80" cy="105" rx="10" ry="16" fill="url(#skinGradSquare)" opacity="0.85"/>
  <ellipse cx="220" cy="105" rx="10" ry="16" fill="url(#skinGradSquare)" opacity="0.85"/>
  <path d="M 84 108 Q 88 112 84 116" stroke="#d9956f" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
  <path d="M 216 108 Q 212 112 216 116" stroke="#d9956f" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.4"/>
  
  <!-- Forehead shine for dimension -->
  <ellipse cx="150" cy="55" rx="45" ry="15" fill="#ffffff" opacity="0.08"/>
  
  <!-- Border/Frame -->
  <rect x="10" y="10" width="280" height="330" fill="none" stroke="#d896ff" stroke-width="2" opacity="0.35" rx="8"/>
  
  <!-- Corner accents -->
  <circle cx="20" cy="20" r="3.5" fill="#d896ff" opacity="0.5"/>
  <circle cx="280" cy="330" r="3.5" fill="#d896ff" opacity="0.5"/>
</svg>